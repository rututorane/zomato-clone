<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    {% extends 'base.html' %}
    {% block content %}
    <div class="container mt-5">
        <h2>My Profile</h2>
        <hr>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="row">
                <div class="col-md-4 text-center">
                    {% if profile.profile_pic %}
                        <img src="{{profile.profile_pic.url }}" alt="Profile Picture" class="img-fluid rounded-circle" style="max-width: 150px; max-height: 150px;">
                    {% else %}
                        <img src="/static/images/default_profile.png" alt="No Image" class="img-fluid rounded-circle" style="max-width: 150px; max-height: 150px; background-color: #ddd;">
                    {% endif %}
                    <div class="mt-3">
                        <input type="file" name="profile_pic" class="form-control-file">
                    </div>
                </div>
                <div class="col-md-8">
                    <p><strong>Username:</strong> {{request.user.username }}</p>
                    <p><strong>Email:</strong> {{request.user.email }}</p>
                    <div style="margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 5px;">Phone:</label>
                        <input type="text" name="phone" value="{{ profile.phone|default:''}}" 
                        class="form-control"
                        pattern="[0-9]{10}"
                        title="Please enter Exactly 10 digits"
                        required>
                    </div>
                    <div style="margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 5px;">Address:</label>
                        <textarea name="address" style="width: 10%; padding: 8px;">{{ profile.address|default:'' }}</textarea>
                    </div>
                    <button type="submit" class="btn btn-primary mt-3">Save Changes</button>
                </div>
            </div>
        </form>
        <div class="mt-4">
            <a href="{% url 'home' %}">Back to Menu</a>
        </div>
    </div>
    {% endblock %}
</body>
</html>
