<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} Zomato Clone{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body{ background-color: #f4f4f4; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;}
        .navbar { background-color: #cb202d !important; padding: 15px 0; box-shadow: 0 2px 5px rgba(0,0,0,0.1);}
        .navbar-brand {font-weight: bold; font-size: 1.5rem;} 
        .nav-link {color:white !important; font-weight: bold; margin-left: 20px;}
        .nav-link.active { border-bottom: 2px solid #ff4500;}
        .footer { background: #333; color: white; padding: 20px 0; margin-top: 40px;}

    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-danger" style="padding: 2px 10px; height: 50px;">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand" href="{% url 'home' %}" style="font-size: 1.2rem; font-weight: bold;">FoodieExpress</a>
            <div class="ms-auto d-flex">
                <a class="nav-link" href="{% url 'home' %}">Menu</a>
                <a class="nav-link" style="margin-right: 15px;" href="{% url 'view_profile' %}">My Profile</a>
            </div>
        </div>
    </nav>

        
    <div class="container mt-4">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-success">
                    {{ message }}
                </div>
            {% endfor%}
        {% endif %}

        {% block content %}
        {% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js"></script>
</body>
</html>
